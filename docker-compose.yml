services:
  backend:
    build:
      context: ./mf-backend
      dockerfile: dockerfile
    container_name: mf-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./mf-backend/.env
    environment:
      - NODE_ENV=production
      - PORT=8080
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/docs" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  frontend:
    build:
      context: ./mf-frontend
      dockerfile: dockerfile
    container_name: mf-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:8080
      - ORIGIN_URL=http://localhost
    deploy:
      resources:
        limits:
          memory: 400M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
