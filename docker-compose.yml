version: '3.8'

services:
  # Next.js Frontend
  mf-frontend:
    build:
      context: ./mf-frontend
      dockerfile: Dockerfile
    container_name: mf-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://mf-backend:8080
    depends_on:
      - mf-backend
    restart: unless-stopped

  # Java Quarkus JVM Backend (Low-RAM Build)
  mf-backend:
    build:
      context: ./mf-backend
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: mf-backend
    ports:
      - "8080:8080"
    environment:
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - DATABASE_URL=jdbc:oracle:thin:@myfinance_high?TNS_ADMIN=/wallet
      - TRUSTED_ORIGINS=http://localhost:3000
    restart: unless-stopped
    volumes:
      - ./mf-backend/wallet:/wallet:ro
