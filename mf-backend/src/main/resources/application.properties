# Oracle DB (Always Free Tier) - Padrão para prod
quarkus.datasource.db-kind=oracle
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:oracle:thin:@myfinance_high?TNS_ADMIN=/Users/air/workspace/my-finance/mf-backend-java/wallet}
quarkus.datasource.username=${DB_USER:admin}
quarkus.datasource.password=${DB_PASSWORD:admin}

# Pool Management & Keep-Alive (Evita Timeout do Oracle Free por inatividade em apps de baixo uso)
quarkus.datasource.jdbc.background-validation-interval=3M
quarkus.datasource.jdbc.validation-query-sql=SELECT 1 FROM DUAL

# %dev Profile (Desenvolvimento local rápido com SQLite)
# %dev.quarkus.datasource.db-kind=sqlite
# %dev.quarkus.datasource.jdbc.url=jdbc:sqlite:mf-dev.db
# %dev.quarkus.datasource.username=
# %dev.quarkus.datasource.password=

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
# Flyway handles migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# JWT Configuration
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.issuer=myfinance
smallrye.jwt.new-token.lifespan=10800
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=mf_session_token

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Cookie
quarkus.http.cors.exposed-headers=Set-Cookie
quarkus.http.cors.access-control-allow-credentials=true

# Server
quarkus.http.port=8080
quarkus.http.root-path=/api
